<div *ngIf="post$ | async as p">
    <h2>{{ p.text }}</h2>
    <input [(ngModel)]="text" placeholder="New title..." />
    <button (click)="editText()">Change Title</button>
  
    <h4>Votes: {{ p.votes }}</h4>
  
    <div id="vote-btn-container">
      <button (click)="upvote()">Upvote</button>
      <button (click)="doubleUpvote()">Double upvote</button>
      <button (click)="downvote()">Downvote</button>
      <button (click)="doubleDownvote()">Double downvote</button>
      <button (click)="randomVote()">Random vote</button>
      <button (click)="resetPost()">Reset</button>
    </div>
  
    <div id="history-btn-container">
      <button id="clear-history-btn" (click)="clearHistory()">Clear History</button>
    </div>

  
    <h4>History:</h4>
    <ul>
      <li *ngFor="let item of p.history">{{ item }}</li>
    </ul>
  </div>
